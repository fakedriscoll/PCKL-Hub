<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PCKL Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .login-hint {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            font-size: 0.8rem;
            border-left: 3px solid #000;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>PCKL Hub</h1>
            <p>Faça login para continuar</p>
        </div>
    </header>

    <main class="container login-container">
        <div class="card login-card">
            <h2>Identifique-se</h2>
            <p style="margin-bottom: 1.5rem; color: var(--text-muted);">Entre com seu e-mail e senha.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">E-mail</label>
                    <input type="email" id="username" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Sua senha" required>
                </div>

                <div id="login-error" style="color: #ff4444; font-size: 0.9rem; display: none; margin-bottom: 1rem;">
                    E-mail ou senha incorretos.
                </div>

                <button type="submit" class="btn">ENTRAR NO SISTEMA</button>
                <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                    Não tem uma conta? <a href="register.html" style="color: #000; font-weight: 700;">Registre-se aqui</a>
                </p>
            </form>

            <div class="login-hint">
                <strong>Dica de Acesso ADM:</strong><br>
                Usuário: <code>admin@pcklhub.com</code> / Senha: <code>admin123</code>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 PCKL Hub. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Firebase SDK via CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

    <script>
        // Inicializar Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDOM0XDng7PdFac-8ESBFJcuyDq29u6JwU",
            authDomain: "pckl-hub.firebaseapp.com",
            projectId: "pckl-hub",
            storageBucket: "pckl-hub.firebasestorage.app",
            messagingSenderId: "754256735890",
            appId: "1:754256735890:web:ad82bc115ab70f15c4404b"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <script src="js/auth.js"></script>
</body>
</html>
