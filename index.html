<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador | PCKL Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .adm-only { display: none; }
        .user-only { display: none; }
        .btn-report { background-color: #333; color: #fff; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="position: relative;">
            <div style="position: absolute; left: 0; top: 50%; transform: translateY(-50%); font-size: 0.8rem; font-weight: 700;">
                LOGADO COMO: <span id="user-role-display" style="text-transform: uppercase;">Administrador</span>
            </div>
            <button onclick="logout()" class="btn btn-outline" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 0.8rem;">SAIR</button>
            <h1>PCKL Hub</h1>
            <p id="header-subtitle">Painel de Eventos</p>
        </div>
    </header>

    <main class="container">
        <section id="admin-actions" class="adm-only" style="margin-bottom: 2rem;">
            <button onclick="generateFrequencyReport()" class="btn btn-report">GERAR RELATÓRIO DE FREQUÊNCIA</button>
        </section>

        <section id="create-event-section" class="card adm-only">
            <h2>Criar Novo Evento</h2>
            <p style="margin-bottom: 1.5rem; color: var(--text-muted);">Preencha as informações para criar um novo evento.</p>
            
            <form id="event-form">
                <div class="form-group">
                    <label for="event-title">Título do Evento</label>
                    <input type="text" id="event-title" placeholder="Ex: Torneio de Pickleball" required>
                </div>

                <div class="form-group">
                    <label for="event-description">Descrição</label>
                    <textarea id="event-description" rows="4" placeholder="Descreva os detalhes do evento..." required></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="event-start-date">Data de Início</label>
                        <input type="date" id="event-start-date" required>
                    </div>
                    <div class="form-group">
                        <label for="event-start-time">Horário de Início</label>
                        <input type="time" id="event-start-time" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="event-end-date">Data de Término</label>
                        <input type="date" id="event-end-date" required>
                    </div>
                    <div class="form-group">
                        <label for="event-end-time">Horário de Término</label>
                        <input type="time" id="event-end-time" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="event-type">Tipo de Ingresso</label>
                        <select id="event-type" required>
                            <option value="gratis">Gratuito</option>
                            <option value="pago">Pago</option>
                        </select>
                    </div>
                    <div class="form-group" id="price-group" style="display: none;">
                        <label for="event-price">Preço (R$)</label>
                        <input type="number" id="event-price" step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>

                <button type="submit" class="btn">CRIAR EVENTO</button>
            </form>
        </section>

        <section id="my-events-section">
            <h2 style="margin-bottom: 1.5rem;">Eventos Disponíveis</h2>
            <div id="events-list"><p style="text-align: center; color: var(--text-muted); padding: 2rem;">Carregando eventos...</p></div>
        </section>

        <!-- Modal de Inscritos / Relatório -->
        <div id="attendees-modal" class="modal-overlay hidden">
            <div class="modal-content card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid var(--primary); padding-bottom: 1rem;">
                    <h2 id="modal-event-title" style="margin: 0;">Inscritos</h2>
                    <button onclick="closeModal()" class="btn btn-outline" style="padding: 0.5rem 1rem;">FECHAR</button>
                </div>
                
                <div class="table-responsive">
                    <table id="attendees-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Telefone</th>
                                <th>Data Inscrição</th>
                            </tr>
                        </thead>
                        <tbody id="attendees-tbody">
                            <!-- Linhas inseridas via JS -->
                        </tbody>
                    </table>
                </div>
                <div id="no-attendees-msg" class="hidden" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                    Ainda não há dados para exibir.
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 PCKL Hub. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Firebase SDK via CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

    <script>
        // Inicializar Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDOM0XDng7PdFac-8ESBFJcuyDq29u6JwU",
            authDomain: "pckl-hub.firebaseapp.com",
            projectId: "pckl-hub",
            storageBucket: "pckl-hub.firebasestorage.app",
            messagingSenderId: "754256735890",
            appId: "1:754256735890:web:ad82bc115ab70f15c4404b"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = sessionStorage.getItem('userRole');
            const roleDisplay = document.getElementById('user-role-display');
            const subtitle = document.getElementById('header-subtitle');
            
            roleDisplay.textContent = role === 'admin' ? 'Administrador' : 'Usuário';
            
            if (role === 'admin') {
                document.querySelectorAll('.adm-only').forEach(el => el.style.display = 'block');
                subtitle.textContent = 'Painel Administrativo de Eventos';
            } else {
                document.querySelectorAll('.user-only').forEach(el => el.style.display = 'block');
                subtitle.textContent = 'Veja os eventos disponíveis e inscreva-se';
            }
        });
    </script>
</body>
</html>
